version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: causehive
      POSTGRES_PASSWORD: causehive
      POSTGRES_DB: causehive
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U causehive"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend/monolithic_app
      dockerfile: Dockerfile
    environment:
      DEBUG: "1"
      SECRET_KEY: dev-secret-key
      SUPABASE_DATABASE_URL: postgresql://causehive:causehive@db:5432/causehive
      FRONTEND_URL: http://localhost:5173
      ALLOWED_HOSTS: localhost,127.0.0.1
    command: ["bash", "-lc", "python manage.py migrate && python /app/migrate_databases.py all && python manage.py runserver 0.0.0.0:8000"]
    working_dir: /app
    volumes:
      - ./backend/monolithic_app:/app
      - ./migrate_databases.py:/app/migrate_databases.py
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    working_dir: /app
    image: node:20-alpine
    command: ["sh", "-lc", "npm install && npm run dev -- --host 0.0.0.0"]
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000

volumes:
  pgdata: {}

